production:
  email_verification_reminders:
    class: EmailVerificationReminderJob
    queue: default
    schedule: at 10am every day
    description: "Send email verification reminders to unconfirmed users"

development:
  email_verification_reminders:
    class: EmailVerificationReminderJob
    queue: default
    schedule: every 30 minutes
    description: "Send email verification reminders to unconfirmed users (frequent for testing)"